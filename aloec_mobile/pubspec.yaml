name: aloec_mobile
description: "ALOEC - Aplicación Móvil de Dieta de Jugos Verdes, Planes e IMC"
publish_to: 'none'

version: 1.2.0+3 # v03

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localización (i18n)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Gestión de Estados e Inyección
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación y Rutas
  go_router: ^17.2.3

  # Firebase Backend
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.1.0
  flutter_local_notifications: ^17.2.1

  # HTTP Client
  http: ^1.2.0

  # Multimedia y Componentes
  cached_network_image: ^3.3.1
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generación de código
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

  # Ícono de la app
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/favicon.JPG"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/favicon.JPG"

flutter:
  uses-material-design: true

  # Configuración de assets e idiomas
  generate: true
  assets:
    - assets/images/
    - assets/videos/
