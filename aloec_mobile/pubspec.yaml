name: aloec_mobile
description: "ALOEC - Aplicación Móvil de Dieta de Jugos Verdes, Planes e IMC"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localización (i18n)
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1

  # Gestión de Estados e Inyección
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navegación y Rutas
  go_router: ^12.1.3

  # Firebase Backend
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.9

  # Multimedia y Componentes
  cached_video_player: ^2.0.4
  cached_network_image: ^3.3.1
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Generación de código
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # Configuración de assets e idiomas
  generate: true
  assets:
    - assets/images/
    - assets/videos/
